name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate version
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "invalid version: $VERSION" >&2
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "tag already exists locally: $VERSION" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "tag already exists on origin: $VERSION" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        run: VERSION="$VERSION" DIST_DIR=dist ./scripts/release.sh

      - name: Smoke test install.sh
        run: |
          python3 -m http.server 18080 --directory dist >/tmp/dpx-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 1
          DPX_INSTALL_BASE_URL=http://127.0.0.1:18080 DPX_INSTALL_DIR="$RUNNER_TEMP/bin" ./scripts/install.sh
          "$RUNNER_TEMP/bin/dpx" --version

      - name: Configure git author
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com

      - name: Create and push tag
        run: |
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION"

      - name: Publish GitHub release
        run: |
          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --generate-notes
