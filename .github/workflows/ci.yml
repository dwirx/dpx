name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -trimpath -ldflags "-s -w -X main.version=ci" ./cmd/dpx

  package:
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release assets
        run: VERSION=ci DIST_DIR=dist ./scripts/release.sh

      - name: Smoke test install.sh
        run: |
          python3 -m http.server 18080 --directory dist >/tmp/dpx-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 1
          DPX_INSTALL_BASE_URL=http://127.0.0.1:18080 DPX_INSTALL_DIR="$RUNNER_TEMP/bin" ./scripts/install.sh
          "$RUNNER_TEMP/bin/dpx" --version
